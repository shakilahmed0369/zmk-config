# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Power saving ───────────────────────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Encoder (uncomment to enable) ─────────────────────────────────────────────
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ── OLED display (uncomment to enable) ────────────────────────────────────────
# CONFIG_ZMK_DISPLAY=y

# ── NRF52840 NFC pins → GPIO (required for P0.09 / Row 4 / thumb cluster) ─────
CONFIG_NFCT_PINS_AS_GPIOS=y