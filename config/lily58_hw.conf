# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Windows BT fixes (from ZMK docs) ──────────────────────────────────────────
# Workaround for Windows battery notification bug that causes instant disconnect
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# Improves connection stability on Windows (Realtek/Intel BT chips)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Boost TX power for stronger connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── Power saving ───────────────────────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_IDLE_TIMEOUT=30000

# ── Encoder (uncomment to enable) ─────────────────────────────────────────────
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ── OLED display (zmk-nice-oled) ──────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=10
CONFIG_NICE_OLED_WIDGET_INVERTED=y

# Central (left): Layer, BT, battery + lightweight extras
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA_ANIMATION_MS=500
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA_ONLY_CAPSLOCK=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA_ANIMATION_MS=500
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_BOX=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y

# Peripheral (right): Gem animation
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_MS=1500
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL=n

# ── NRF52840 NFC pins → GPIO (required for P0.09 / Row 4 / thumb cluster) ─────
CONFIG_NFCT_PINS_AS_GPIOS=y